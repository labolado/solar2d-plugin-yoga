name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew install luajit cmake
      - name: Build Solar2D plugin
        run: |
          mkdir -p build && cd build
          cmake .. -DSOLAR2D_PLUGIN=ON \
            -DLUA_INCLUDE_DIR=$(brew --prefix luajit)/include/luajit-2.1
          make -j4
      - name: Package
        run: |
          cd build
          cp plugin_yoga.dylib plugin_yoga-mac-sim.dylib
          tar czf plugin.yoga-mac-sim.tgz plugin_yoga-mac-sim.dylib
          cp plugin_yoga.dylib plugin_yoga-mac.dylib
          tar czf plugin.yoga-mac.tgz plugin_yoga-mac.dylib
      - name: Upload to release
        run: |
          gh release upload ${GITHUB_REF_NAME} build/plugin.yoga-mac*.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
